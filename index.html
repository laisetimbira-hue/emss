    --r:12px; --r2:18px;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ease:cubic-bezier(.32,.72,0,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  .mono{display:block;background:var(--mono) center/contain no-repeat;flex:none}
  body{background:var(--branco);color:var(--preto);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
  h1,h2,h3{font-family:var(--serif);font-weight:400;letter-spacing:-.015em;line-height:1.1}
  h1{font-size:34px}
  h2{font-size:22px}
  input,select,textarea,button{font:inherit;color:inherit}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--preto);color:var(--branco)}
  :focus-visible{outline:2px solid var(--preto);outline-offset:2px;border-radius:4px}

  /* navegação */
  .lateral{position:fixed;inset:0 auto 0 0;width:236px;border-right:1px solid var(--linha);padding:32px 20px;display:none;flex-direction:column}
  .marca{padding:0 12px}
  .marca .mono{height:38px;width:31px}
  .marca b{display:block;font-family:var(--serif);font-size:21px;font-weight:400;margin-top:12px;letter-spacing:.01em}
  .etiqueta{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--cinza)}
  .menu{margin-top:38px;display:flex;flex-direction:column;gap:2px}
  .menu a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r);color:var(--cinza);font-size:14px;transition:background .2s var(--ease),color .2s var(--ease)}
  .menu a:hover{background:var(--nevoa);color:var(--preto)}
  .menu a.ativo{background:var(--verde-fundo);color:var(--verde);font-weight:600}
  .nota{margin-top:auto;padding:0 12px;font-size:12px;color:var(--cinza)}

  .topoCel{position:fixed;inset:0 0 auto 0;z-index:20;display:flex;align-items:center;gap:10px;height:54px;padding:0 20px;border-bottom:1px solid var(--linha);background:rgba(255,255,255,.92);backdrop-filter:blur(16px)}
  .topoCel .mono{height:26px;width:21px}
  .topoCel span{font-family:var(--serif);font-size:17px}
  .rodape{position:fixed;inset:auto 0 0 0;z-index:20;display:flex;border-top:1px solid var(--linha);background:rgba(255,255,255,.92);backdrop-filter:blur(16px);padding-bottom:env(safe-area-inset-bottom)}
  .rodape a{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 0 13px;font-size:11px;color:var(--cinza);transition:color .2s var(--ease)}
  .rodape a.ativo{color:var(--verde);font-weight:600}

  main{padding:82px 20px 96px}
  .area{max-width:940px;margin:0 auto}
  @media(min-width:1024px){
    .lateral{display:flex} .rodape,.topoCel{display:none}
    main{margin-left:236px;padding:48px 40px 48px}
  }

  .cabecalho{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:14px;border-bottom:1px solid var(--linha);padding-bottom:20px;margin-bottom:28px}
  .sub{color:var(--cinza);font-size:13px;margin-top:6px}

  /* peças */
  .cartao{border:1px solid var(--linha);border-radius:var(--r2);background:var(--branco)}
  .grade3{display:grid;gap:14px;grid-template-columns:1fr}
  @media(min-width:640px){.grade3{grid-template-columns:repeat(3,1fr)}}
  .num{font-family:var(--serif);font-size:44px;margin-top:12px;font-variant-numeric:tabular-nums}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:0;border-radius:999px;padding:9px 17px;font-size:14px;font-weight:500;cursor:pointer;background:var(--verde);color:var(--branco);transition:background .2s var(--ease),opacity .2s var(--ease)}
  .btn:hover{background:#424c42}
  .btn.claro{background:var(--branco);color:var(--preto);border:1px solid var(--linha2)}
  .btn.claro:hover{background:var(--nevoa)}
  .btn.texto{background:none;color:var(--cinza);padding:7px 11px}
  .btn.texto:hover{background:var(--nevoa);color:var(--preto)}
  .btn.perigo:hover{color:#b42318;background:#fef3f2}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .campo{display:block;margin-bottom:16px}
  .campo>span{display:block;font-size:12px;font-weight:600;color:var(--grafite);margin-bottom:6px}
  .campo input,.campo select,.campo textarea{width:100%;border:1px solid var(--linha);background:var(--nevoa);border-radius:var(--r);padding:10px 13px;font-size:14px;transition:border-color .2s var(--ease),background .2s var(--ease)}
  .campo textarea{min-height:84px;resize:vertical}
  .campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:var(--linha2);background:var(--branco)}
  .dupla{display:grid;gap:0 16px;grid-template-columns:1fr}
  @media(min-width:560px){.dupla{grid-template-columns:1fr 1fr}}
  .marcar{display:flex;align-items:center;gap:9px;font-size:14px;margin-bottom:16px;cursor:pointer}
  .marcar input{width:17px;height:17px;accent-color:var(--verde)}

  .busca{position:relative;margin-bottom:22px}
  .busca input{width:100%;border:1px solid var(--linha);background:var(--nevoa);border-radius:999px;padding:11px 18px 11px 42px;font-size:14px}
  .busca input:focus{outline:none;border-color:var(--linha2);background:var(--branco)}
  .busca svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--cinza)}

  .vazio{border:1px dashed var(--linha);border-radius:var(--r2);padding:56px 24px;text-align:center}
  .vazio p{color:var(--cinza);font-size:14px;margin-top:8px}

  /* lista de pacientes */
  .lista{display:flex;flex-direction:column}
  .linha{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:var(--r);cursor:pointer;transition:background .2s var(--ease)}
  .linha:hover{background:var(--nevoa)}
  .ret{width:42px;height:42px;border-radius:999px;object-fit:cover;background:var(--nevoa);border:1px solid var(--linha);flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;color:var(--cinza)}
  .linha b{font-weight:600;font-size:14.5px}
  .linha small{color:var(--cinza);font-size:12.5px}

  /* ficha */
  .abas{display:flex;gap:4px;border-bottom:1px solid var(--linha);margin-bottom:26px;overflow-x:auto}

const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const hoje = () => iso(new Date());
const esc = t => String(t ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const dataBR = d => d ? d.split('-').reverse().join('/') : '—';
const moeda = c => (c/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const idade = nasc => {
  if(!nasc) return null;
  const n = new Date(nasc + 'T12:00:00'), h2 = new Date();
  let a = h2.getFullYear() - n.getFullYear();
  if(h2.getMonth() < n.getMonth() || (h2.getMonth() === n.getMonth() && h2.getDate() < n.getDate())) a--;
  return a >= 0 && a < 130 ? a : null;
};
const iniciais = n => n.trim().split(/\s+/).slice(0,2).map(p => p[0]).join('').toUpperCase();

/* A foto vira texto para caber no Firestore. Original de celular passa de 5 MB;
   comprimida fica em ~300 KB, dentro do limite de 1 MB por documento. */
function comprimir(arquivo, largura = 1400, q = 0.82){
  return new Promise(ok => {
    const img = new Image();
    img.onload = () => {
      const e = Math.min(1, largura / img.width);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * e);
      c.height = Math.round(img.height * e);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(img.src);
      ok(c.toDataURL('image/jpeg', q));
    };
    img.src = URL.createObjectURL(arquivo);
  });
}

/* Duas versões: a miniatura fica junto do atendimento e é o que a linha do tempo
   mostra; a grande só é baixada quando você clica pra ampliar. */
async function duasVias(arquivo){
  let img = await comprimir(arquivo, 1400);
  if(img.length > 900000) img = await comprimir(arquivo, 1000, 0.7);  // teto de 1 MB do Firestore
  return { img, thumb: await comprimir(arquivo, 240, 0.7) };
}

function aviso(txt){
  document.querySelectorAll('.aviso').forEach(a => a.remove());
  const d = document.createElement('div');
  d.className = 'aviso'; d.textContent = txt; d.setAttribute('role','status');
  document.body.append(d);
  setTimeout(() => { d.classList.add('some'); setTimeout(() => d.remove(), 200); }, 2200);
}

  document.querySelectorAll('[data-r]').forEach(a => a.classList.toggle('ativo', a.dataset.r === base));

async function rotear(){
  if(!UID) return;
  const rota = location.hash || '#/';
  marcarAtivo(rota);
  window.scrollTo(0,0);
  if(rota.startsWith('#/paciente/')) return telaFicha(rota.split('/')[2]);

    <div id="resultado"></div>`;

  const pintar = termo => {
    const t = termo.trim().toLowerCase();
    const vis = t ? todas.filter(p => p.nome.toLowerCase().includes(t)) : todas;

    if(!todas.length){
      alvo.innerHTML = `<div class="vazio"><h2>Nenhuma paciente ainda</h2><p>Cadastre a primeira para começar.</p></div>`;
      return;
    }
    if(!vis.length){

      return;

        <div><b>${esc(p.nome)}</b><br><small>${p.telefone ? esc(p.telefone) : 'Sem telefone'}</small></div>
      </div>`).join('')}</div>`;
    alvo.querySelectorAll('.linha').forEach(l => l.onclick = () => location.hash = `#/paciente/${l.dataset.id}`);
  };

  pintar('');
  document.getElementById('q').oninput = e => pintar(e.target.value);
  document.getElementById('nova').onclick = () => formPaciente();
}

function formPaciente(p){
  const novo = !p;
  p = p || {id:id(), nome:'', cpf:'', nascimento:'', telefone:'', whatsapp:'', email:'', profissao:'', obs:'', foto:null, criadoEm:Date.now()};
  let foto = p.foto;

  abrirModal(`
    <div class="topo"><h2>${novo ? 'Nova paciente' : 'Editar dados'}</h2></div>
    <div class="perfil">
      <div id="previa">${foto ? `<img class="ret" src="${foto}" alt="">` : `<div class="ret">—</div>`}</div>
      <button class="btn claro" id="escolher">Escolher foto</button>
      <input type="file" id="arquivo" accept="image/*" hidden>
    </div>
    <label class="campo"><span>Nome</span><input id="nome" value="${esc(p.nome)}" required></label>
    <div class="dupla">
      <label class="campo"><span>CPF</span><input id="cpf" inputmode="numeric" value="${esc(p.cpf)}"></label>
      <label class="campo"><span>Data de nascimento <b id="idadeAviso" style="font-weight:600;color:var(--verde)"></b></span><input id="nascimento" type="date" value="${esc(p.nascimento)}"></label>
      <label class="campo"><span>Telefone</span><input id="telefone" inputmode="tel" value="${esc(p.telefone)}"></label>
      <label class="campo"><span>WhatsApp</span><input id="whatsapp" inputmode="tel" value="${esc(p.whatsapp)}"></label>
      <label class="campo"><span>Profissão</span><input id="profissao" value="${esc(p.profissao || '')}"></label>
    </div>
    <label class="campo"><span>E-mail</span><input id="email" type="email" value="${esc(p.email)}"></label>
    <label class="campo"><span>Observações</span><textarea id="obs">${esc(p.obs)}</textarea></label>
    <div class="acoes">
      <button class="btn texto" id="cancelar">Cancelar</button>
      <button class="btn" id="salvar">Salvar</button>
    </div>`);

  const nascCampo = modalCorpo.querySelector('#nascimento');
  const idadeAviso = modalCorpo.querySelector('#idadeAviso');
  const mostrarIdade = () => {
    const a = idade(nascCampo.value);
    idadeAviso.textContent = a === null ? '' : `· ${a} anos`;
  };
  nascCampo.oninput = mostrarIdade; mostrarIdade();

  const arquivo = modalCorpo.querySelector('#arquivo');
  modalCorpo.querySelector('#escolher').onclick = () => arquivo.click();
  arquivo.onchange = async () => {
    if(!arquivo.files[0]) return;
    foto = await comprimir(arquivo.files[0], 200, 0.75);
    modalCorpo.querySelector('#previa').innerHTML = `<img class="ret" src="${foto}" alt="">`;
  };
  modalCorpo.querySelector('#cancelar').onclick = fecharModal;
  modalCorpo.querySelector('#salvar').onclick = async () => {
    const nome = modalCorpo.querySelector('#nome').value.trim();
    if(!nome){ aviso('O nome é obrigatório.'); return; }
    const reg = {...p, nome, foto,
      cpf: modalCorpo.querySelector('#cpf').value.trim(),
      nascimento: modalCorpo.querySelector('#nascimento').value,
      telefone: modalCorpo.querySelector('#telefone').value.trim(),
      whatsapp: modalCorpo.querySelector('#whatsapp').value.trim(),
      email: modalCorpo.querySelector('#email').value.trim(),
      profissao: modalCorpo.querySelector('#profissao').value.trim(),
      obs: modalCorpo.querySelector('#obs').value.trim()};
    await DB.gravar('pacientes', reg);
    fecharModal();
    aviso(novo ? 'Paciente cadastrada.' : 'Dados salvos.');
    rotear();
  };
  setTimeout(() => modalCorpo.querySelector('#nome').focus(), 60);
}

let abaAtual = 'dados';

async function telaFicha(pid){
  const p = await DB.ler('pacientes', pid);
  if(!p){ tela.innerHTML = `<div class="vazio"><h2>Paciente não encontrada</h2><p>Este registro não existe.</p></div>`; return; }

  tela.innerHTML = `
    <a href="#/pacientes" class="btn texto" style="margin-bottom:18px;padding-left:0">${ICO.volta}Pacientes</a>
    <div class="perfil">
      ${p.foto ? `<img class="ret" src="${p.foto}" alt="">` : `<div class="ret">${esc(iniciais(p.nome))}</div>`}
      <div><h1 style="font-size:30px">${esc(p.nome)}</h1>
        <p class="sub">${p.telefone ? esc(p.telefone) : 'Sem telefone'}</p></div>
    </div>
    <div class="abas">
      <button data-a="dados">Dados</button>
      <button data-a="anamnese">Anamnese</button>
      <button data-a="fotos">Fotos</button>
      <button data-a="historico">Histórico</button>
    </div>
    <div id="conteudo"></div>`;

  const pintarAbas = () => tela.querySelectorAll('.abas button').forEach(b => b.classList.toggle('ativo', b.dataset.a === abaAtual));
  tela.querySelectorAll('.abas button').forEach(b => b.onclick = () => { abaAtual = b.dataset.a; pintarAbas(); montar(); });

  const montar = () => {
    const alvo = document.getElementById('conteudo');
    if(abaAtual === 'dados') return abaDados(alvo, p);
    if(abaAtual === 'anamnese') return abaAnamnese(alvo, p);
    if(abaAtual === 'fotos') return abaFotos(alvo, p);
    return abaHistorico(alvo, p);
  };
  pintarAbas(); montar();
}

function abaDados(alvo, p){
  const a = idade(p.nascimento);
  const linhas = [['CPF',p.cpf],['Nascimento', p.nascimento ? dataBR(p.nascimento) + (a === null ? '' : ` · ${a} anos`) : ''],
    ['Telefone',p.telefone],['WhatsApp',p.whatsapp],['E-mail',p.email],['Profissão',p.profissao],['Observações',p.obs]];
  alvo.innerHTML = `
    <div class="cartao" style="padding:8px 22px 18px">
      ${linhas.map(([r,v]) => `<div style="display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--linha)">
        <span class="etiqueta" style="flex:none">${r}</span>
        <span style="text-align:right;font-size:14px;white-space:pre-wrap">${v ? esc(v) : '<span style="color:var(--linha2)">—</span>'}</span></div>`).join('')}
    </div>
    <div class="acoes" style="border:0">
      <button class="btn texto perigo" id="excluir">Excluir paciente</button>
      <button class="btn claro" id="editar">Editar dados</button>
    </div>`;
  alvo.querySelector('#editar').onclick = () => formPaciente(p);
  alvo.querySelector('#excluir').onclick = async () => {
    if(!await confirmar(`Excluir ${p.nome} e todo o histórico dela? Não tem como desfazer.`)) return;
    for(const a of await DB.por('atendimentos','pacienteId',p.id)) await DB.apagar('atendimentos', a.id);
    for(const f of await DB.por('fotos','pacienteId',p.id)) await DB.apagar('fotos', f.id);
    for(const r of await DB.por('retornos','pacienteId',p.id)) await DB.apagar('retornos', r.id);
    await DB.apagar('anamneses', p.id);
    await DB.apagar('pacientes', p.id);
    aviso('Paciente excluída.');
    location.hash = '#/pacientes';
  };
}

async function abaAnamnese(alvo, p){
  const a = (await DB.ler('anamneses', p.id)) ||
    {pacienteId:p.id, alergias:'', doencas:'', medicamentos:'', cirurgias:'', gestacao:false, queixa:'', objetivos:''};

  const texto = [['alergias','Alergias'],['doencas','Doenças'],['medicamentos','Medicamentos'],
    ['cirurgias','Cirurgias'],['queixa','Queixa principal'],['objetivos','Objetivos do tratamento']];

  alvo.innerHTML = `
    <div class="cartao" style="padding:24px 22px 8px">
      ${texto.map(([k,r]) => `<label class="campo"><span>${r}</span><textarea data-k="${k}">${esc(a[k])}</textarea></label>`).join('')}
      <label class="marcar"><input type="checkbox" data-k="gestacao" ${a.gestacao ? 'checked' : ''}>Gestante</label>
    </div>
    <p class="sub" style="text-align:right;margin-top:12px" id="estado">Salva sozinho enquanto você escreve.</p>`;

  let timer;
  const salvar = async () => {
    alvo.querySelectorAll('[data-k]').forEach(c => a[c.dataset.k] = c.type === 'checkbox' ? c.checked : c.value);
    a.atualizadoEm = Date.now();
    await DB.gravar('anamneses', a);
    alvo.querySelector('#estado').textContent = 'Salvo às ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  };
  alvo.querySelectorAll('[data-k]').forEach(c => {
    c.oninput = () => { clearTimeout(timer); timer = setTimeout(salvar, 600); };
    if(c.type === 'checkbox') c.onchange = salvar;
  });
}

async function abaHistorico(alvo, p){
  const [ats, rets, ans] = await Promise.all([DB.por('atendimentos','pacienteId',p.id), DB.por('retornos','pacienteId',p.id), DB.todos('anotacoes')]);
  const anotadas = new Set(ans.filter(a => a.imagem).map(a => a.id));

  const eventos = [
    ...ats.map(a => ({tipo:'atendimento', data:a.data, dado:a})),
    ...rets.map(r => ({tipo:'retorno', data:r.data, dado:r}))
  ].sort((x,y) => y.data.localeCompare(x.data));

  alvo.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:26px;flex-wrap:wrap">
      <button class="btn" id="novoAt">${ICO.mais}Novo atendimento</button>
      <button class="btn claro" id="novoRet">Marcar retorno</button>
    </div>
    <div id="tempo"></div>`;

  alvo.querySelector('#novoAt').onclick = () => formAtendimento(p);
  alvo.querySelector('#novoRet').onclick = () => formRetorno(p);

  const t = alvo.querySelector('#tempo');
  if(!eventos.length){
    t.innerHTML = `<div class="vazio"><h2>Sem histórico ainda</h2><p>Registre o primeiro atendimento desta paciente.</p></div>`;
    return;
  }

  t.className = 'tempo';
  t.innerHTML = eventos.map(e => {
    if(e.tipo === 'retorno'){
      const futuro = e.data >= hoje() && !e.dado.concluido;
      return `<div class="evento ${futuro ? 'futuro' : ''}">
        <div class="data">${dataBR(e.data)}</div>
        <h3>Retorno${e.dado.hora ? ' · ' + e.dado.hora : ''}${e.dado.concluido ? ' · concluído' : futuro ? ' · marcado' : ''}</h3>
        ${e.dado.obs ? `<div class="obs">${esc(e.dado.obs)}</div>` : ''}
        <div style="margin-top:8px;display:flex;gap:4px">
          ${!e.dado.concluido ? `<button class="btn texto" data-ok="${e.dado.id}">Marcar como feito</button>` : ''}
          <button class="btn texto perigo" data-delr="${e.dado.id}">Excluir</button>
        </div></div>`;
    }
    const a = e.dado;
    const minhas = (a.fotos || []).slice().sort((x,y) => x.momento.localeCompare(y.momento));
    return `<div class="evento">
      <div class="data">${dataBR(a.data)}</div>
      <h3>${esc(a.procedimento)}</h3>
      <div class="meta">${[a.produto && esc(a.produto), a.quantidade && esc(a.quantidade), a.valorCentavos ? moeda(a.valorCentavos) : ''].filter(Boolean).join(' · ') || '—'}</div>
      ${a.obs ? `<div class="obs" style="margin-top:8px">${esc(a.obs)}</div>` : ''}
      ${minhas.length ? `<div class="miniaturas">${minhas.map(f => `
        <figure><img src="${f.thumb}" alt="${f.momento}" data-zoom="${f.id}">
        <figcaption>${f.momento}${anotadas.has(f.id) ? ' ·<b style="color:var(--verde)"> anotada</b>' : ''}</figcaption></figure>`).join('')}</div>` : ''}
      <div style="margin-top:10px"><button class="btn texto perigo" data-dela="${a.id}">Excluir</button></div>
    </div>`;
  }).join('');

  t.querySelectorAll('[data-zoom]').forEach(i => i.onclick = () => abrirFoto(i.dataset.zoom, i.src, () => telaFicha(p.id)));
  t.querySelectorAll('[data-ok]').forEach(b => b.onclick = async () => {
    const r = await DB.ler('retornos', b.dataset.ok);
    await DB.gravar('retornos', {...r, concluido:true});
    aviso('Retorno concluído.'); abaHistorico(alvo, p);
  });
  t.querySelectorAll('[data-delr]').forEach(b => b.onclick = async () => {
    if(!await confirmar('Excluir este retorno?')) return;
    await DB.apagar('retornos', b.dataset.delr);
    aviso('Retorno excluído.'); abaHistorico(alvo, p);
  });
  t.querySelectorAll('[data-dela]').forEach(b => b.onclick = async () => {
    if(!await confirmar('Excluir este atendimento e as fotos dele?')) return;
    for(const f of await DB.por('fotos','atendimentoId',b.dataset.dela)){
      await DB.apagar('anotacoes', f.id).catch(() => {});
      await DB.apagar('fotos', f.id);
    }
    await DB.apagar('atendimentos', b.dataset.dela);
    aviso('Atendimento excluído.'); abaHistorico(alvo, p);
  });
}

/* Visualização da foto: alterna Original/Anotada e abre o editor. */
async function abrirFoto(fid, previa, depois){
  const acoes = document.getElementById('lupaAcoes');
  const imgEl = document.getElementById('lupaImg');
  imgEl.src = previa; acoes.innerHTML = ''; lupa.showModal();

  const [f, an] = await Promise.all([DB.ler('fotos', fid), DB.ler('anotacoes', fid)]);
  if(!f) return;
  const temAnotacao = an && an.imagem;
  let mostrando = temAnotacao ? 'anotada' : 'original';
  const pintar = () => {
    imgEl.src = mostrando === 'anotada' ? an.imagem : f.img;
    acoes.innerHTML = `
      ${temAnotacao ? `<div class="alternar">
        <button data-v="original" class="${mostrando === 'original' ? 'ativo' : ''}">Original</button>
        <button data-v="anotada" class="${mostrando === 'anotada' ? 'ativo' : ''}">Anotada</button>
      </div>` : ''}
      <button class="btn claro" id="lupaEditar">Editar</button>`;
    acoes.querySelectorAll('[data-v]').forEach(b => b.onclick = e => { e.stopPropagation(); mostrando = b.dataset.v; pintar(); });
    acoes.querySelector('#lupaEditar').onclick = e => {
      e.stopPropagation();
      lupa.close();
      Editor.abrir(f.img, fid, an ? an.tracos : [], depois);
    };
  };
  pintar();
}

/* ---------- aba Fotos: o rosto por ângulos + modo apresentação ---------- */
async function abaFotos(alvo, p){
  const [fotos, ans, ats] = await Promise.all([
    DB.por('fotos','pacienteId',p.id), DB.todos('anotacoes'), DB.por('atendimentos','pacienteId',p.id)
  ]);
  const anot = new Map(ans.filter(a => a.imagem).map(a => [a.id, a]));
  const dataDe = new Map(ats.map(a => [a.id, a.data]));
  fotos.forEach(f => f.data = dataDe.get(f.atendimentoId) || '');
  fotos.sort((a,b) => (b.data || '').localeCompare(a.data || '') || b.criadoEm - a.criadoEm);

  if(!fotos.length){
    alvo.innerHTML = `<div class="vazio"><h2>Sem fotos ainda</h2><p>As fotos entram pelos atendimentos, na aba Histórico.</p></div>`;
    return;
  }

  const grupos = [...ANGULOS, ''];
  const rotulo = a => a || 'Sem ângulo';

  /* ordem de apresentação: percorre os ângulos na sequência do protocolo,
     pegando a foto mais recente de cada; depois as demais */
  const sequencia = [];
  grupos.forEach(a => fotos.filter(f => (f.angulo || '') === a).forEach(f => sequencia.push(f)));

  alvo.innerHTML = grupos.map(a => {
    const doGrupo = fotos.filter(f => (f.angulo || '') === a);
    if(!doGrupo.length) return '';
    return `<div class="etiqueta" style="margin:4px 0 10px">${rotulo(a)}</div>
      <div class="miniaturas" style="margin:0 0 22px">
        ${doGrupo.map(f => `<figure>
          <img src="${anot.has(f.id) ? anot.get(f.id).imagem : f.thumb}" data-apre="${f.id}" alt="">
          <figcaption>${f.data ? dataBR(f.data).slice(0,5) : ''} · ${f.momento}${anot.has(f.id) ? ' ·<b style="color:var(--verde)"> anotada</b>' : ''}</figcaption>
        </figure>`).join('')}
      </div>`;
  }).join('') + `<p class="sub">Toque numa foto e deslize para o lado para percorrer os ângulos com a paciente.</p>`;

  alvo.querySelectorAll('[data-apre]').forEach(img => img.onclick = () => {
    const i = sequencia.findIndex(f => f.id === img.dataset.apre);
    apresentar(sequencia, i, p);
  });
}

/* Modo apresentação: uma foto por vez, deslizar troca de ângulo. */
async function apresentar(seq, indice, p){
  const acoes = document.getElementById('lupaAcoes');
  const imgEl = document.getElementById('lupaImg');
  lupa.showModal();

  let i = indice, mostrando = 'auto', x0 = null;

  async function pintar(){
    const f0 = seq[i];
    imgEl.src = f0.thumb;
    const [f, an] = await Promise.all([DB.ler('fotos', f0.id), DB.ler('anotacoes', f0.id)]);
    const tem = an && an.imagem;
    const vendoAnotada = tem && mostrando !== 'original';
    imgEl.src = vendoAnotada ? an.imagem : f.img;

    acoes.innerHTML = `
      <button class="btn texto" id="apAnt" ${i === 0 ? 'disabled' : ''}>${ICO.esq}</button>
      <span class="etiqueta" style="align-self:center;min-width:110px;text-align:center">${esc(f0.angulo || 'Sem ângulo')} · ${i+1}/${seq.length}</span>
      <button class="btn texto" id="apProx" ${i === seq.length-1 ? 'disabled' : ''}>${ICO.dir}</button>
      ${tem ? `<div class="alternar">
        <button data-v="original" class="${!vendoAnotada ? 'ativo' : ''}">Original</button>
        <button data-v="anotada" class="${vendoAnotada ? 'ativo' : ''}">Anotada</button>
      </div>` : ''}
      <button class="btn claro" id="apEditar">Editar</button>`;

    acoes.querySelector('#apAnt').onclick = e => { e.stopPropagation(); if(i > 0){ i--; mostrando = 'auto'; pintar(); } };
    acoes.querySelector('#apProx').onclick = e => { e.stopPropagation(); if(i < seq.length-1){ i++; mostrando = 'auto'; pintar(); } };
    acoes.querySelectorAll('[data-v]').forEach(b => b.onclick = e => { e.stopPropagation(); mostrando = b.dataset.v; pintar(); });
    acoes.querySelector('#apEditar').onclick = e => {
      e.stopPropagation(); lupa.close();
      Editor.abrir(f.img, f0.id, an ? an.tracos : [], () => { abaAtual = 'fotos'; telaFicha(p.id); });
    };
  }

  imgEl.onpointerdown = e => { x0 = e.clientX; };
  imgEl.onpointerup = e => {
    if(x0 === null) return;
    const dx = e.clientX - x0; x0 = null;
    if(Math.abs(dx) < 40) return;               // toque parado fecha (comportamento da lupa)
    if(dx < 0 && i < seq.length-1){ i++; mostrando = 'auto'; pintar(); }
    if(dx > 0 && i > 0){ i--; mostrando = 'auto'; pintar(); }
  };

  pintar();
}

  const procSel = modalCorpo.querySelector('#procSel');

  procSel.onchange = () => {
    procOutroCx.style.display = procSel.value === '__outro' ? 'block' : 'none';

  };

  ['antes','depois'].forEach(m => {

    modalCorpo.querySelector(`[data-add="${m}"]`).onclick = () => entrada.click();
    entrada.onchange = async () => {
      for(const f of entrada.files) novas[m].push(await duasVias(f));
      modalCorpo.querySelector(`[data-previa="${m}"]`).innerHTML =
        novas[m].map((v, i) => `<figure><img src="${v.thumb}" alt="">
          <select data-ang="${m}:${i}" style="width:96px;margin-top:4px;font-size:11px;border:1px solid var(--linha);border-radius:8px;padding:3px">
            <option value="">Ângulo…</option>

          </select></figure>`).join('');
      modalCorpo.querySelectorAll('[data-ang]').forEach(s => s.onchange = () => {

        novas[mm][+ii].angulo = s.value;
      });
      entrada.value = '';
    };
  });

  modalCorpo.querySelector('#cancelar').onclick = fecharModal;
  modalCorpo.querySelector('#salvar').onclick = async () => {
    const procedimento = procSel.value === '__outro'
      ? modalCorpo.querySelector('#procOutro').value.trim()
      : procSel.value;
    if(!procedimento){ aviso('Informe o procedimento.'); return; }
    const bruto = modalCorpo.querySelector('#valor').value.replace(/\./g,'').replace(',','.');
    const at = {
      id:id(), pacienteId:p.id,
      data: modalCorpo.querySelector('#data').value || hoje(),
      procedimento,
      produto: modalCorpo.querySelector('#produto').value.trim(),
      quantidade: modalCorpo.querySelector('#quantidade').value.trim(),
      valorCentavos: Math.round((parseFloat(bruto) || 0) * 100),
      obs: modalCorpo.querySelector('#obs').value.trim(),
      fotos: [],

    for(const m of ['antes','depois'])
      for(const v of novas[m]){
        const fid = id();
        at.fotos.push({id: fid, momento: m, thumb: v.thumb, angulo: v.angulo || ''});
        await DB.gravar('fotos', {id: fid, atendimentoId: at.id, pacienteId: p.id, momento: m, angulo: v.angulo || '', img: v.img, criadoEm: Date.now()});
      }
    await DB.gravar('atendimentos', at);
    fecharModal();
    aviso('Atendimento salvo.');
    if(at.valorCentavos > 0 &&
       await perguntar('Registrar pagamento', 'Deseja registrar o pagamento deste procedimento no Financeiro?', 'Registrar', 'Agora não')){
      formReceita({
        id: id(), data: at.data, pacienteId: p.id, procedimento: at.procedimento,
        valorCentavos: at.valorCentavos, forma: 'pix', status: 'recebido', obs: '',
        atendimentoId: at.id, criadoEm: Date.now()
      }, true, () => telaFicha(p.id));
      return;
    }
    telaFicha(p.id);
  };
}

/* ---------- agenda ---------- */
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
let mesRef = (() => { const d = new Date(); d.setDate(1); return d; })();
let diaSel = hoje();

async function telaAgenda(){
  const [rets, ats, pacs] = await Promise.all([DB.todos('retornos'), DB.todos('atendimentos'), DB.todos('pacientes')]);
  const nome = pid => (pacs.find(p => p.id === pid) || {}).nome || 'Paciente removida';

  /* tudo que acontece num dia, junto e ordenado por hora */
  const porDia = {};
  const juntar = (d, e) => (porDia[d] = porDia[d] || []).push(e);
  rets.forEach(r => juntar(r.data, {tipo: r.concluido ? 'feito' : 'retorno', hora: r.hora || '',
    pid: r.pacienteId, titulo: 'Retorno' + (r.concluido ? ' · concluído' : ''), obs: r.obs}));
  ats.forEach(a => juntar(a.data, {tipo: 'atendimento', hora: '', pid: a.pacienteId, titulo: a.procedimento, obs: a.obs}));
  Object.values(porDia).forEach(l => l.sort((x, y) => (x.hora || '99').localeCompare(y.hora || '99')));

  const atrasados = rets.filter(r => !r.concluido && r.data < hoje()).sort((a, b) => a.data.localeCompare(b.data));

  tela.innerHTML = `
    <div class="cabecalho"><div><h1>Agenda</h1><p class="sub">Retornos e atendimentos</p></div></div>
    ${atrasados.length ? `<div class="cartao" style="padding:14px 18px;margin-bottom:18px;border-color:var(--verde)">
      <div class="etiqueta" style="color:var(--verde)">${atrasados.length} retorno${atrasados.length > 1 ? 's' : ''} atrasado${atrasados.length > 1 ? 's' : ''}</div>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px">
        ${atrasados.map(r => `<button class="rot" style="background:none;border:0;cursor:pointer;text-align:left;font-size:13.5px" data-ir="${r.pacienteId}">
          <b>${dataBR(r.data)}</b> ${esc(nome(r.pacienteId))}</button>`).join('')}
      </div></div>` : ''}
    <div>
      <div class="calTopo">
        <h2 id="mes"></h2>
        <nav>
          <button class="btn texto" id="hj" style="font-size:13px">Hoje</button>
          <button class="seta" id="ant" aria-label="Mês anterior">${ICO.esq}</button>
          <button class="seta" id="prox" aria-label="Próximo mês">${ICO.dir}</button>
        </nav>
      </div>
      <div class="semana">${['dom','seg','ter','qua','qui','sex','sáb'].map(d => `<span>${d}</span>`).join('')}</div>
      <div class="dias" id="dias"></div>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-size:11.5px;color:var(--cinza)">
      ${[['retorno','Retorno marcado'],['feito','Retorno concluído'],['atendimento','Atendimento realizado']]
        .map(([c, r]) => `<span style="display:flex;align-items:center;gap:6px"><span class="pt ${c}"></span>${r}</span>`).join('')}
    </div>
    <div id="doDia"></div>`;

  tela.querySelectorAll('[data-ir]').forEach(b => b.onclick = () => { abaAtual = 'historico'; location.hash = `#/paciente/${b.dataset.ir}`; });
  tela.querySelector('#ant').onclick = () => { mesRef.setMonth(mesRef.getMonth() - 1); pintar(); };
  tela.querySelector('#prox').onclick = () => { mesRef.setMonth(mesRef.getMonth() + 1); pintar(); };
  tela.querySelector('#hj').onclick = () => { mesRef = new Date(); mesRef.setDate(1); diaSel = hoje(); pintar(); };

  function pintar(){
    const m = MESES[mesRef.getMonth()];
    tela.querySelector('#mes').textContent = `${m[0].toUpperCase()}${m.slice(1)} de ${mesRef.getFullYear()}`;

    const dow = new Date(mesRef.getFullYear(), mesRef.getMonth(), 1).getDay();
    const noMes = new Date(mesRef.getFullYear(), mesRef.getMonth() + 1, 0).getDate();
    const total = Math.ceil((dow + noMes) / 7) * 7;
    const inicio = new Date(mesRef.getFullYear(), mesRef.getMonth(), 1 - dow);

    let html = '';
    for(let i = 0; i < total; i++){
      const d = new Date(inicio.getFullYear(), inicio.getMonth(), inicio.getDate() + i);
      const ds = iso(d);
      const itens = porDia[ds] || [];
      const classes = ['dia'];
      if(d.getMonth() !== mesRef.getMonth()) classes.push('fora');
      if(ds === hoje()) classes.push('hoje');
      if(ds === diaSel) classes.push('sel');
      html += `<button class="${classes.join(' ')}" data-d="${ds}">
        <div class="n">${d.getDate()}</div>
        <div class="pontos">${itens.slice(0, 4).map(i => `<span class="pt ${i.tipo}"></span>`).join('')}</div>
      </button>`;
    }
    tela.querySelector('#dias').innerHTML = html;
    tela.querySelectorAll('.dia').forEach(b => b.onclick = () => { diaSel = b.dataset.d; pintar(); });
    pintarDia();
  }

  function pintarDia(){
    const alvo = tela.querySelector('#doDia');
    if(!diaSel){ alvo.innerHTML = ''; return; }
    const itens = porDia[diaSel] || [];
    alvo.innerHTML = `<div class="etiqueta" style="margin:28px 0 10px">${dataBR(diaSel)}</div>` + (
      !itens.length
        ? `<p class="sub" style="padding:4px 2px 8px">Nada marcado neste dia.</p>`
        : `<div class="lista">${itens.map(i => `
            <div class="linha" data-p="${i.pid}">
              <div class="ret" style="font-size:11px;letter-spacing:.05em">${i.hora || '—'}</div>
              <div><b>${esc(nome(i.pid))}</b><br><small>${esc(i.titulo)}${i.obs ? ' · ' + esc(i.obs) : ''}</small></div>
            </div>`).join('')}</div>`);
    alvo.querySelectorAll('.linha').forEach(l => l.onclick = () => { abaAtual = 'historico'; location.hash = `#/paciente/${l.dataset.p}`; });
  }

  pintar();
}

/* ---------- financeiro ---------- */
const ANGULOS = ['Frontal','Perfil direito','Perfil esquerdo','45° direito','45° esquerdo'];
const PROCEDIMENTOS = ['Hipro','Toxina botulínica','Bioestimulador','Depilação a laser'];
const FORMAS = {pix:'Pix', cartao:'Cartão', dinheiro:'Dinheiro', transferencia:'Transferência'};
const CATEGORIAS = ['Aluguel','Produtos','Fornecedores','Equipamentos','Marketing','Internet','Energia','Água','Impostos','Outros'];
let mesFin = (() => { const d = new Date(); d.setDate(1); return d; })();
let abaFin = 'receitas';

const dinheiro = v => {
  const bruto = String(v).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.');
  return Math.round((parseFloat(bruto) || 0) * 100);
};
const valorTexto = c => (c/100).toLocaleString('pt-BR',{minimumFractionDigits:2});

async function telaFinanceiro(){
  const [recs, desps, pacs, ats] = await Promise.all([
    DB.todos('receitas'), DB.todos('despesas'), DB.todos('pacientes'), DB.todos('atendimentos')
  ]);
  const nome = pid => pid ? ((pacs.find(p => p.id === pid) || {}).nome || 'Paciente removida') : '—';
  const mes = `${mesFin.getFullYear()}-${String(mesFin.getMonth()+1).padStart(2,'0')}`;
  const noMes = l => l.filter(x => (x.data || '').startsWith(mes));

  const rMes = noMes(recs), dMes = noMes(desps);
  const soma = l => l.reduce((t,x) => t + (x.valorCentavos || 0), 0);
  const faturamento = soma(rMes);
  const recebido = soma(rMes.filter(r => r.status === 'recebido'));
  const pendenteMes = faturamento - recebido;
  const despesas = soma(dMes);
  const lucro = recebido - despesas;
  const nAts = noMes(ats).length;
  const ticket = nAts ? Math.round(faturamento / nAts) : 0;

  const pendentes = recs.filter(r => r.status === 'pendente').sort((a,b) => a.data.localeCompare(b.data));
  const mn = MESES[mesFin.getMonth()];

  tela.innerHTML = `
    <div class="cabecalho">
      <div><h1>Financeiro</h1><p class="sub" style="text-transform:capitalize">${mn} de ${mesFin.getFullYear()}</p></div>
      <nav style="display:flex;align-items:center;gap:2px">
        <button class="btn texto" id="hjFin" style="font-size:13px">Hoje</button>
        <button class="seta" id="antFin">${ICO.esq}</button>
        <button class="seta" id="proxFin">${ICO.dir}</button>
      </nav>
    </div>

    <div class="grade3">
      ${[['Faturamento do mês', moeda(faturamento)],
         ['Recebido', moeda(recebido)],
         ['A receber no mês', moeda(pendenteMes)],
         ['Despesas do mês', moeda(despesas)],
         ['Lucro do mês', moeda(lucro)],
         ['Atendimentos · ticket médio', `${nAts} · ${moeda(ticket)}`]]
        .map(([r,v]) => `<div class="cartao" style="padding:20px 22px"><div class="etiqueta">${r}</div>
          <div class="num" style="font-size:28px;margin-top:8px">${v}</div></div>`).join('')}
    </div>

    ${pendentes.length ? `<div class="cartao" style="padding:16px 18px;margin-top:22px;border-color:var(--verde)">
      <div class="etiqueta" style="color:var(--verde)">Valores em aberto</div>
      <div class="lista" style="margin-top:6px">
        ${pendentes.map(r => `<div class="linha" style="cursor:default">
          <div class="ret" style="font-size:11px">${dataBR(r.data).slice(0,5)}</div>
          <div style="flex:1"><b>${esc(nome(r.pacienteId))}</b><br><small>${esc(r.procedimento || 'Receita')} · ${moeda(r.valorCentavos)}</small></div>
          <button class="btn claro" data-receber="${r.id}" style="padding:7px 14px;font-size:13px">Receber</button>
        </div>`).join('')}
      </div></div>` : ''}

    <div class="abas" style="margin-top:30px">
      <button data-f="receitas">Receitas do mês</button>
      <button data-f="despesas">Despesas do mês</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="btn" id="novaRec">${ICO.mais}Nova receita</button>
      <button class="btn claro" id="novaDesp">${ICO.mais}Nova despesa</button>
    </div>
    <div id="listaFin"></div>`;

  tela.querySelector('#antFin').onclick = () => { mesFin.setMonth(mesFin.getMonth()-1); telaFinanceiro(); };
  tela.querySelector('#proxFin').onclick = () => { mesFin.setMonth(mesFin.getMonth()+1); telaFinanceiro(); };
  tela.querySelector('#hjFin').onclick = () => { mesFin = new Date(); mesFin.setDate(1); telaFinanceiro(); };
  tela.querySelector('#novaRec').onclick = () => formReceita(null, false, telaFinanceiro);
  tela.querySelector('#novaDesp').onclick = () => formDespesa(null, telaFinanceiro);

  tela.querySelectorAll('[data-receber]').forEach(b => b.onclick = async () => {
    const r = await DB.ler('receitas', b.dataset.receber);
    await DB.gravar('receitas', {...r, status:'recebido'});
    aviso('Recebido.'); telaFinanceiro();
  });

  const pintarAbasFin = () => tela.querySelectorAll('[data-f]').forEach(b => b.classList.toggle('ativo', b.dataset.f === abaFin));
  tela.querySelectorAll('[data-f]').forEach(b => b.onclick = () => { abaFin = b.dataset.f; pintarAbasFin(); pintarLista(); });

  function pintarLista(){
    const alvo = tela.querySelector('#listaFin');
    if(abaFin === 'receitas'){
      const l = rMes.slice().sort((a,b) => b.data.localeCompare(a.data));
      alvo.innerHTML = !l.length
        ? `<div class="vazio"><h2>Sem receitas neste mês</h2><p>Lance uma receita ou registre um atendimento com valor.</p></div>`
        : `<div class="lista">${l.map(r => `<div class="linha" data-er="${r.id}">
            <div class="ret" style="font-size:11px">${dataBR(r.data).slice(0,5)}</div>
            <div style="flex:1"><b>${esc(nome(r.pacienteId))}</b><br>
              <small>${esc(r.procedimento || 'Receita')} · ${FORMAS[r.forma] || ''}${r.status === 'pendente' ? ' · <b style="color:var(--verde)">pendente</b>' : ''}</small></div>
            <b style="font-variant-numeric:tabular-nums">${moeda(r.valorCentavos)}</b>
          </div>`).join('')}</div>`;
      alvo.querySelectorAll('[data-er]').forEach(x => x.onclick = async () =>
        formReceita(await DB.ler('receitas', x.dataset.er), false, telaFinanceiro));
    } else {
      const l = dMes.slice().sort((a,b) => b.data.localeCompare(a.data));
      alvo.innerHTML = !l.length
        ? `<div class="vazio"><h2>Sem despesas neste mês</h2><p>Lance a primeira despesa.</p></div>`
        : `<div class="lista">${l.map(d => `<div class="linha" data-ed="${d.id}">
            <div class="ret" style="font-size:11px">${dataBR(d.data).slice(0,5)}</div>
            <div style="flex:1"><b>${esc(d.descricao)}</b><br><small>${esc(d.categoria)} · ${FORMAS[d.forma] || ''}</small></div>
            <b style="font-variant-numeric:tabular-nums">− ${moeda(d.valorCentavos)}</b>
          </div>`).join('')}</div>`;
      alvo.querySelectorAll('[data-ed]').forEach(x => x.onclick = async () =>
        formDespesa(await DB.ler('despesas', x.dataset.ed), telaFinanceiro));
    }
  }
  pintarAbasFin(); pintarLista();
}

/* ---------- editor de fotos ----------
   As marcações são traços vetoriais gravados em 'anotacoes' (documento separado,
   um por foto). A foto original nunca é alterada. */
const Editor = (() => {
  const el = document.getElementById('editor');
  const palco = document.getElementById('edPalco');
  const cvFoto = document.getElementById('cvFoto');
  const cvTinta = document.getElementById('cvTinta');
  const ctxF = cvFoto.getContext('2d');
  const ctxT = cvTinta.getContext('2d');

  const CORES = ['#0c0c0b','#c0392b','#546054','#1d5fbf','#e6a817','#ffffff'];
  const ESPESSURAS = [3, 6, 12];

  let img = null, fotoId = null, aoConcluir = null;
  let tracos = [], refazerPilha = [];
  let ferramenta = 'caneta', cor = CORES[1], esp = 1, soCaneta = false;
  let vista = {x:0, y:0, k:1};
  let desenhando = null;          // traço em andamento
  let toques = new Map();         // ponteiros ativos no palco
  let pinca = null;               // estado do gesto de dois dedos

  /* ----- barra de ferramentas ----- */
  const FERS = {
    caneta:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 3l4 4L8 20l-5 1 1-5L17 3z"/></svg>',
    marca:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 11l6-6 4 4-6 6H9v-4z" opacity=".45"/><path d="M9 11l6-6 4 4-6 6H9v-4zM4 20h9"/></svg>',
    borracha:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M7 20l-4-4a2 2 0 0 1 0-2.8l8.2-8.2a2 2 0 0 1 2.8 0l6 6a2 2 0 0 1 0 2.8L14 20H7z"/><path d="M6 12l7 7"/></svg>',
    desfazer:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg>',
    refazer:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h3"/></svg>',
    lixo:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>'
  };

  function montarBarra(){
    document.getElementById('edBarra').innerHTML = `
      <button class="fer" data-fer="caneta" title="Caneta">${FERS.caneta}</button>
      <button class="fer" data-fer="marca" title="Marca-texto">${FERS.marca}</button>
      <button class="fer" data-fer="borracha" title="Borracha (toque no traço)">${FERS.borracha}</button>
      <span class="edSep"></span>
      ${CORES.map((c,i) => `<button class="cor" data-cor="${i}" style="background:${c}"></button>`).join('')}
      <span class="edSep"></span>
      ${ESPESSURAS.map((e,i) => `<button class="esp" data-esp="${i}"><i style="width:${5+i*4}px;height:${5+i*4}px"></i></button>`).join('')}
      <span class="edSep"></span>
      <button class="fer" id="edDesfazer" title="Desfazer">${FERS.desfazer}</button>
      <button class="fer" id="edRefazer" title="Refazer">${FERS.refazer}</button>
      <button class="fer" id="edLimpar" title="Limpar tudo">${FERS.lixo}</button>
      <span class="edSep"></span>
      <label class="soCaneta"><input type="checkbox" id="edSoCaneta">Só caneta</label>`;

    el.querySelectorAll('[data-fer]').forEach(b => b.onclick = () => { ferramenta = b.dataset.fer; pintarBarra(); });
    el.querySelectorAll('[data-cor]').forEach(b => b.onclick = () => { cor = CORES[+b.dataset.cor]; if(ferramenta === 'borracha') ferramenta = 'caneta'; pintarBarra(); });
    el.querySelectorAll('[data-esp]').forEach(b => b.onclick = () => { esp = +b.dataset.esp; pintarBarra(); });
    document.getElementById('edDesfazer').onclick = desfazer;
    document.getElementById('edRefazer').onclick = refazer;
    document.getElementById('edLimpar').onclick = limpar;
    document.getElementById('edSoCaneta').onchange = e => soCaneta = e.target.checked;
  }

  function pintarBarra(){
    el.querySelectorAll('[data-fer]').forEach(b => b.classList.toggle('ativo', b.dataset.fer === ferramenta));
    el.querySelectorAll('[data-cor]').forEach(b => b.classList.toggle('ativo', CORES[+b.dataset.cor] === cor && ferramenta !== 'borracha'));
    el.querySelectorAll('[data-esp]').forEach(b => b.classList.toggle('ativo', +b.dataset.esp === esp));
    document.getElementById('edDesfazer').disabled = !tracos.length;
    document.getElementById('edRefazer').disabled = !refazerPilha.length;
  }

  /* ----- coordenadas: tela -> imagem ----- */
  function paraImagem(e){
    const r = palco.getBoundingClientRect();
    return { x: (e.clientX - r.left - vista.x) / vista.k,
             y: (e.clientY - r.top - vista.y) / vista.k,
             p: e.pressure && e.pointerType === 'pen' ? e.pressure : 1 };
  }

  /* ----- desenhar tudo ----- */
  function aplicarVista(){
    const t = `translate(${vista.x}px,${vista.y}px) scale(${vista.k})`;
    cvFoto.style.transform = t; cvTinta.style.transform = t;
  }

  function tracar(ctx, tr){
    if(tr.pts.length < 2) {
      const p = tr.pts[0];
      ctx.beginPath();
      ctx.arc(p.x, p.y, tr.larg * (p.p || 1) / 2, 0, 7);
      ctx.fillStyle = tr.cor; ctx.globalAlpha = tr.marca ? .35 : 1;
      ctx.fill(); ctx.globalAlpha = 1;
      return;
    }
    ctx.strokeStyle = tr.cor;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.globalAlpha = tr.marca ? .35 : 1;
    for(let i = 1; i < tr.pts.length; i++){
      const a = tr.pts[i-1], b = tr.pts[i];
      ctx.beginPath();
      ctx.lineWidth = tr.larg * ((a.p + b.p) / 2 || 1);
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function redesenhar(){
    ctxT.clearRect(0, 0, cvTinta.width, cvTinta.height);
    tracos.forEach(t => tracar(ctxT, t));
    if(desenhando) tracar(ctxT, desenhando);
  }

  /* ----- borracha de traços: apaga o traço tocado ----- */
  function apagarEm(pt){
    for(let i = tracos.length - 1; i >= 0; i--){
      const alvo = (tracos[i].larg + 14) / vista.k;
      if(tracos[i].pts.some(p => Math.hypot(p.x - pt.x, p.y - pt.y) < alvo)){
        refazerPilha = [];
        tracos.splice(i, 1);
        redesenhar(); pintarBarra();
        return;
      }
    }
  }

  function desfazer(){ if(tracos.length){ refazerPilha.push(tracos.pop()); redesenhar(); pintarBarra(); } }
  function refazer(){ if(refazerPilha.length){ tracos.push(refazerPilha.pop()); redesenhar(); pintarBarra(); } }
  async function limpar(){
    if(!tracos.length) return;
    if(!await perguntar('Limpar marcações', 'Apagar todas as marcações desta foto?', 'Limpar', 'Cancelar')) return;
    refazerPilha = []; tracos = []; redesenhar(); pintarBarra();
  }

  /* ----- gestos ----- */
  palco.addEventListener('pointerdown', e => {
    e.preventDefault();
    palco.setPointerCapture(e.pointerId);
    toques.set(e.pointerId, e);

    if(toques.size === 2){
      // segundo dedo: vira pinça e cancela o traço que tinha começado
      desenhando = null; redesenhar();
      const [a, b] = [...toques.values()];
      pinca = { d: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY),
                cx: (a.clientX + b.clientX) / 2, cy: (a.clientY + b.clientY) / 2,
                vista: {...vista} };
      return;
    }

    const dedoNavega = soCaneta && e.pointerType === 'touch';
    if(dedoNavega){ pinca = {arrasto:true, x0:e.clientX, y0:e.clientY, vista:{...vista}}; return; }

    const pt = paraImagem(e);
    if(ferramenta === 'borracha'){ apagarEm(pt); desenhando = {borracha:true}; return; }
    desenhando = { cor, larg: ESPESSURAS[esp], marca: ferramenta === 'marca', pts: [pt] };
    redesenhar();
  });

  palco.addEventListener('pointermove', e => {
    if(!toques.has(e.pointerId)) return;
    toques.set(e.pointerId, e);

    if(pinca && toques.size === 2){
      const [a, b] = [...toques.values()];
      const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      const cx = (a.clientX + b.clientX) / 2, cy = (a.clientY + b.clientY) / 2;
      const k = Math.min(8, Math.max(.3, pinca.vista.k * d / pinca.d));
      const r = palco.getBoundingClientRect();
      // o ponto da imagem sob o centro da pinça continua sob o centro
      const ix = (pinca.cx - r.left - pinca.vista.x) / pinca.vista.k;
      const iy = (pinca.cy - r.top - pinca.vista.y) / pinca.vista.k;
      vista = { k, x: cx - r.left - ix * k, y: cy - r.top - iy * k };
      aplicarVista();
      return;
    }
    if(pinca && pinca.arrasto){
      vista.x = pinca.vista.x + e.clientX - pinca.x0;
      vista.y = pinca.vista.y + e.clientY - pinca.y0;
      aplicarVista();
      return;
    }
    if(!desenhando) return;
    const pt = paraImagem(e);
    if(desenhando.borracha){ apagarEm(pt); return; }
    // pontos coalescidos deixam o traço liso na velocidade do Pencil
    const eventos = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    eventos.forEach(ev => desenhando.pts.push(paraImagem(ev)));
    redesenhar();
  });

  const soltar = e => {
    toques.delete(e.pointerId);
    if(toques.size < 2) pinca = pinca && pinca.arrasto && toques.size === 1 ? pinca : null;
    if(desenhando && !desenhando.borracha && desenhando.pts.length){
      tracos.push(desenhando); refazerPilha = [];
    }
    desenhando = null;
    redesenhar(); pintarBarra();
  };
  palco.addEventListener('pointerup', soltar);
  palco.addEventListener('pointercancel', soltar);

  /* roda do mouse: zoom no computador */
  palco.addEventListener('wheel', e => {
    e.preventDefault();
    const r = palco.getBoundingClientRect();
    const k = Math.min(8, Math.max(.3, vista.k * (e.deltaY < 0 ? 1.12 : .89)));
    const ix = (e.clientX - r.left - vista.x) / vista.k;
    const iy = (e.clientY - r.top - vista.y) / vista.k;
    vista = { k, x: e.clientX - r.left - ix * k, y: e.clientY - r.top - iy * k };
    aplicarVista();
  }, {passive:false});

  /* ----- abrir e fechar ----- */
  function enquadrar(){
    const r = palco.getBoundingClientRect();
    const k = Math.min(r.width / img.width, r.height / img.height) * .96;
    vista = { k, x: (r.width - img.width * k) / 2, y: (r.height - img.height * k) / 2 };
    aplicarVista();
  }

  async function abrir(imagem, idFoto, tracosSalvos, depois){
    img = new Image();
    await new Promise(ok => { img.onload = ok; img.src = imagem; });
    fotoId = idFoto; aoConcluir = depois;
    tracos = (tracosSalvos || []).map(t => ({...t, pts: t.pts.map(p => ({...p}))}));
    refazerPilha = []; desenhando = null; toques.clear(); pinca = null;
    ferramenta = 'caneta';

    cvFoto.width = cvTinta.width = img.width;
    cvFoto.height = cvTinta.height = img.height;
    ctxF.drawImage(img, 0, 0);

    montarBarra(); pintarBarra();
    el.classList.add('aberto');
    enquadrar(); redesenhar();
  }

  document.getElementById('edFechar').onclick = () => el.classList.remove('aberto');
  document.getElementById('edSalvar').onclick = async () => {
    // grava os traços e uma imagem pronta (foto + marcações) para exibição rápida
    redesenhar();
    const junta = document.createElement('canvas');
    junta.width = img.width; junta.height = img.height;
    const jc = junta.getContext('2d');
    jc.drawImage(cvFoto, 0, 0); jc.drawImage(cvTinta, 0, 0);
    let qualidade = .82, saida = junta.toDataURL('image/jpeg', qualidade);
    if(saida.length > 900000) saida = junta.toDataURL('image/jpeg', .6);

    await DB.gravar('anotacoes', {
      id: fotoId,
      tracos: tracos.map(t => ({cor:t.cor, larg:t.larg, marca:!!t.marca,
        pts: t.pts.map(p => ({x:Math.round(p.x), y:Math.round(p.y), p:Math.round((p.p||1)*100)/100}))})),
      imagem: tracos.length ? saida : null,
      atualizadoEm: Date.now()
    });
    el.classList.remove('aberto');
    aviso(tracos.length ? 'Marcações salvas.' : 'Marcações removidas.');
    aoConcluir && aoConcluir();
  };

  return { abrir };
})();

/* ---------- entrar e sair ---------- */
const erroLogin = document.getElementById('erroLogin');

const RECADO = {
  'auth/invalid-credential': 'Senha errada.',
  'auth/wrong-password': 'Senha errada.',
  'auth/user-not-found': 'O acesso ainda não foi criado no Firebase.',
  'auth/invalid-email': 'O acesso ainda não foi criado no Firebase.',
  'auth/too-many-requests': 'Muitas tentativas. Espere alguns minutos.',
  'auth/network-request-failed': 'Sem internet. O primeiro acesso precisa de conexão.',
  'auth/user-disabled': 'Este acesso foi desativado.'
};

document.getElementById('frmLogin').onsubmit = async e => {
  e.preventDefault();
  const btn = document.getElementById('btnEntrar');
  const senha = document.getElementById('pwd').value;
  if(!senha){ erroLogin.textContent = 'Digite a senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando…'; erroLogin.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, ACESSO, senha);
  } catch (e) {
    erroLogin.textContent = RECADO[e.code] || 'Não deu para entrar. Tente de novo.';
  }
  btn.disabled = false; btn.textContent = 'Entrar';
};

const sair = async () => {
  if(!await confirmar('Sair do sistema? Os dados continuam salvos.')) return;
  await signOut(auth);
};
document.getElementById('sair').onclick = sair;
document.getElementById('sairCel').onclick = sair;

/* O Firebase lembra a sessão: só pede senha de novo se você sair. */
onAuthStateChanged(auth, u => {
  document.body.classList.remove('carregando');
  if(u){
    UID = u.uid;
    document.body.classList.add('entrou');
    document.getElementById('pwd').value = '';
    rotear();
  } else {
    UID = null;
    document.body.classList.remove('entrou');
    tela.innerHTML = '';
  }
});
